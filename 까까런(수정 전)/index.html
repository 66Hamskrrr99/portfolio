<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Run Clone - Antigravity Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- Game UI Layer -->
        <div id="ui-layer">
            <div class="score-box">JELLY: <span id="score">0</span></div>
            <div class="score-box">ANTIGRAVITY RUN</div>
        </div>

        <!-- Game Canvas -->
        <canvas id="gameCanvas" width="800" height="400"></canvas>

        <!-- Game Over / Start Screen -->
        <div id="game-over">
            <h1>GAME OVER</h1>
            <p>Your Final Jelly: <span id="final-score">0</span></p>
            <button onclick="startGame()">RESTART</button>
            <p style="margin-top: 20px; font-size: 14px; opacity: 0.7;">
                Press [SPACE] or [CLICK] to Jump (Double Jump Available!)
            </p>
        </div>
    </div>

    <!-- Game Logic -->
    <script src="game.js"></script>
</body>
</html>
